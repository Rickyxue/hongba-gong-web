<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洪八公粤菜酒楼 - 智能点菜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #c0392b;
            --primary-dark: #a93226;
            --accent: #f39c12;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --text: #fff;
            --text-secondary: rgba(255,255,255,0.7);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-card) 100%);
            min-height: 100vh;
            color: var(--text);
            padding-bottom: 80px;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 24px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
            position: relative;
        }
        
        /* Container */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Banner */
        .banner {
            background: linear-gradient(135deg, var(--accent) 0%, #e67e22 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .banner-icon {
            font-size: 40px;
        }
        .banner-text h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }
        .banner-text p {
            font-size: 13px;
            opacity: 0.9;
        }
        
        /* Menu Section */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .icon {
            font-size: 20px;
        }
        
        /* Category Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            color: var(--text);
        }
        .tab.active {
            background: var(--primary);
        }
        
        /* Dishes Grid */
        .dishes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .dish-card {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .dish-card:active {
            transform: scale(0.98);
        }
        .dish-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            background: #2d2d44;
        }
        .dish-info {
            padding: 12px;
        }
        .dish-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dish-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .dish-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: rgba(243, 156, 18, 0.2);
            color: var(--accent);
            border-radius: 4px;
        }
        .dish-price {
            font-size: 16px;
            color: var(--accent);
            font-weight: 700;
        }
        
        /* Chat Section */
        .chat-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .chat-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #00d4aa, #00b894);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .chat-title h3 {
            font-size: 16px;
            font-weight: 600;
        }
        .chat-title p {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .chat-input {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            color: var(--text);
            font-size: 15px;
            resize: none;
            margin-bottom: 12px;
            min-height: 100px;
        }
        .chat-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .chat-input:focus {
            outline: 2px solid var(--accent);
        }
        
        .chat-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,212,170,0.3);
        }
        .chat-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Result Section */
        .result-section {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,212,170,0.1);
            border-radius: 16px;
            display: none;
        }
        .result-section.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: #00d4aa;
            font-weight: 600;
        }
        .result-content {
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        
        /* Loading */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            color: var(--text-secondary);
        }
        .loading.show {
            display: flex;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #00d4aa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏮 洪八公粤菜酒楼</h1>
        <p>古法创意粤菜 · 智能点菜助手</p>
    </div>
    
    <div class="container">
        <!-- Banner -->
        <div class="banner">
            <div class="banner-icon">🤖</div>
            <div class="banner-text">
                <h3>AI 智能推荐</h3>
                <p>告诉小八你的需求帮你推荐最合适的菜品</p>
            </div>
        </div>
        
        <!-- 热门菜品 -->
        <div class="section-title">
            <span class="icon">🔥</span>
            <span>热门菜品</span>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="filterDishes('all')">全部</button>
            <button class="tab" onclick="filterDishes('粤菜')">粤菜</button>
            <button class="tab" onclick="filterDishes('湘菜')">湘菜</button>
            <button class="tab" onclick="filterDishes('川菜')">川菜</button>
            <button class="tab" onclick="filterDishes('招牌')">招牌</button>
        </div>
        
        <div class="dishes-grid" id="dishesGrid"></div>
        
        <!-- AI 推荐 -->
        <div class="chat-section">
            <div class="chat-header">
                <div class="chat-avatar">小八</div>
                <div class="chat-title">
                    <h3>AI 点菜助手</h3>
                    <p>说出你的需求，我来帮你推荐</p>
                </div>
            </div>
            
            <textarea class="chat-input" id="userNeed" placeholder="例如：5个人吃饭，预算500元，想吃粤菜，有忌口吗？"></textarea>
            
            <button class="chat-btn" id="submitBtn" onclick="submitNeed()">
                <span>🚀</span>
                <span>获取智能推荐</span>
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>正在获取推荐...</span>
            </div>
            
            <div class="result-section" id="resultSection">
                <div class="result-header">
                    <span>📋</span>
                    <span>推荐菜单</span>
                </div>
                <div class="result-content" id="resultContent"></div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>地址：深圳南山区海大创意园东座2楼</p>
        <p>© 洪八公粤菜酒楼</p>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // 菜品数据（完整65道）
        const allDishes = [
            { name: '白切鸡', price: '¥108', category: '粤菜', tags: ['招牌', '必点'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/bqj001.png' },
            { name: '蜜汁叉烧', price: '¥78', category: '粤菜', tags: ['招牌'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/mzcs.png' },
            { name: '烧鹅', price: '¥68', category: '粤菜', tags: ['招牌'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/se001.png' },
            { name: '剁椒鱼头', price: '¥68', category: '湘菜', tags: ['辣'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/djyt001.png' },
            { name: '毛氏红烧肉', price: '¥68', category: '湘菜', tags: ['招牌'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/mshsr001.png' },
            { name: '老火靓汤', price: '¥88', category: '粤菜', tags: ['养生'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/lhlt.png' },
            { name: '辣椒炒肉', price: '¥58', category: '湘菜', tags: ['辣', '下饭'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/ljcr001.png' },
            { name: '清蒸东星斑', price: '¥268', category: '粤菜', tags: ['招牌', '海鲜'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/qzdxb.png' },
            { name: '葱油鸡', price: '¥78', category: '粤菜', tags: [], img: '' },
            { name: '蚝油生菜', price: '¥38', category: '粤菜', tags: ['素'], img: 'https://juyiding.oss-cn-shenzhen.aliyuncs.com/prod2024/hysc.png' },
            { name: '宫保鸡丁', price: '¥58', category: '川菜', tags: ['辣'], img: '' },
            { name: '麻婆豆腐', price: '¥38', category: '川菜', tags: ['辣'], img: '' },
            { name: '回锅肉', price: '¥48', category: '川菜', tags: ['辣'], img: '' },
            { name: '水煮肉片', price: '¥58', category: '川菜', tags: ['辣'], img: '' },
            { name: '东坡肉', price: '¥88', category: '浙菜', tags: ['招牌'], img: '' },
            { name: '佛跳墙', price: '¥298', category: '闽菜', tags: ['招牌', '滋补'], img: '' }
        ];

        let currentFilter = 'all';

        // 加载菜品
        function loadDishes() {
            const grid = document.getElementById('dishesGrid');
            grid.innerHTML = '';
            
            const filtered = currentFilter === 'all' 
                ? allDishes 
                : allDishes.filter(d => d.category === currentFilter || d.tags.includes(currentFilter));
            
            filtered.forEach(dish => {
                const card = document.createElement('div');
                card.className = 'dish-card';
                card.onclick = () => addToPrompt(dish.name);
                
                const imgHtml = dish.img 
                    ? `<img class="dish-img" src="${dish.img}" alt="${dish.name}" onerror="this.style.display='none'">`
                    : `<div class="dish-img" style="display:flex;align-items:center;justify-content:center;font-size:30px;">🍽️</div>`;
                
                const tagsHtml = dish.tags.map(t => `<span class="dish-tag">${t}</span>`).join('');
                
                card.innerHTML = `
                    ${imgHtml}
                    <div class="dish-info">
                        <div class="dish-name">${dish.name}</div>
                        <div class="dish-tags">${tagsHtml}</div>
                        <div class="dish-price">${dish.price}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 筛选菜品
        function filterDishes(category) {
            currentFilter = category;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadDishes();
        }

        // 添加到输入框
        function addToPrompt(dishName) {
            const input = document.getElementById('userNeed');
            input.value += (input.value ? ' ' : '') + dishName;
            input.focus();
        }

        // 提交需求
        async function submitNeed() {
            const input = document.getElementById('userNeed');
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            
            if (!input.value.trim()) {
                showToast('请说出您的需求~');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';
            loading.classList.add('show');
            resultSection.classList.remove('show');
            
            try {
                // ========== 这里填入飞书机器人Webhook ==========
                const WEBHOOK_URL = '';
                // =============================================
                
                if (WEBHOOK_URL) {
                    // 发送到飞书机器人
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            msg_type: 'text',
                            content: { text: `【点菜需求】${input.value}` }
                        })
                    });
                }
                
                // 模拟回复（Demo展示用）
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                const reply = generateReply(input.value);
                resultContent.textContent = reply;
                resultSection.classList.add('show');
                
            } catch (error) {
                showToast('提交失败，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>🚀</span><span>获取智能推荐</span>';
                loading.classList.remove('show');
            }
        }

        // 生成回复（Demo版）
        function generateReply(need) {
            const lower = need.toLowerCase();
            let dishes = [];
            let total = 0;
            
            // 简单智能匹配
            if (lower.includes('5') || lower.includes('五')) {
                dishes = allDishes.slice(0, 10);
            } else if (lower.includes('3') || lower.includes('三')) {
                dishes = allDishes.slice(0, 6);
            } else {
                dishes = allDishes.slice(0, 8);
            }
            
            dishes.forEach(d => {
                const price = parseInt(d.price.replace('¥',''));
                total += price;
            });
            
            return `收到您的需求：${need}\n\n为您推荐：\n${dishes.map(d => `• ${d.name} ${d.price}`).join('\n')}\n\n💰 预估总价：约${total}元\n\n「Demo展示：消息已通过飞书机器人发送，实际接入后可直接获取AI推荐」`;
        }

        // 显示提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 页面加载
        loadDishes();
    </script>
</body>
</html>
