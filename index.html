<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洪八公粤菜酒楼 - 智能点菜 V0.10</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #c0392b;
            --primary-dark: #a93226;
            --accent: #f39c12;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --text: #fff;
            --text-secondary: rgba(255,255,255,0.7);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-card) 100%);
            min-height: 100vh;
            color: var(--text);
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 16px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 120px;
        }
        
        .banner {
            background: linear-gradient(135deg, var(--accent) 0%, #e67e22 100%);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .banner-icon { font-size: 28px; }
        .banner-text h3 { font-size: 15px; margin-bottom: 2px; }
        .banner-text p { font-size: 12px; opacity: 0.9; }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tab {
            padding: 8px 14px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            color: var(--text);
        }
        .tab.active { background: var(--primary); }
        
        .dishes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .dish-card {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px;
            position: relative;
        }
        .dish-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .dish-desc { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; min-height: 28px; }
        .dish-bottom { display: flex; align-items: center; justify-content: space-between; }
        .dish-price { font-size: 15px; color: var(--accent); font-weight: 700; }
        
        .add-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        
        .stepper { display: none; align-items: center; gap: 6px; }
        .stepper.show { display: flex; }
        .stepper-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        .stepper-num { font-size: 13px; min-width: 18px; text-align: center; }
        
        /* 搭配推荐浮窗 */
        .pair-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .pair-popup.show { display: flex; }
        .pair-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
        }
        .pair-content {
            position: relative;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .pair-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .pair-title { font-size: 15px; font-weight: 600; color: var(--accent); }
        .pair-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
        }
        .pair-dish {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pair-dish-info { flex: 1; }
        .pair-dish-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
        .pair-dish-reason { font-size: 11px; color: var(--text-secondary); }
        .pair-dish-right { display: flex; align-items: center; gap: 8px; }
        .pair-dish-price { font-size: 13px; color: var(--accent); font-weight: 600; }
        
        .pair-add-btn {
            padding: 6px 12px;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
        }
        
        .pair-done-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
        }
        
        .chat-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-dark);
            padding: 10px 16px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            max-height: 50px;
            overflow: hidden;
        }
        .chat-section.expanded { max-height: 85vh; overflow-y: auto; }
        
        .chat-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }
        .chat-toggle-icon { font-size: 18px; }
        .chat-toggle-text { font-size: 13px; color: #00d4aa; font-weight: 600; }
        
        .chat-content { display: none; }
        .chat-section.expanded .chat-toggle { display: none; }
        .chat-section.expanded .chat-content { display: block; }
        
        .chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .chat-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00d4aa, #00b894);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .chat-title h3 { font-size: 13px; font-weight: 600; }
        .chat-title p { font-size: 10px; color: var(--text-secondary); }
        .chat-close-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
        }
        
        .chat-input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: var(--text);
            font-size: 13px;
            resize: none;
            margin-bottom: 8px;
            min-height: 50px;
        }
        .chat-input::placeholder { color: rgba(255,255,255,0.4); }
        
        .chat-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .result-section {
            margin-top: 10px;
            padding: 12px;
            background: rgba(0,212,170,0.1);
            border-radius: 10px;
            display: none;
        }
        .result-section.show { display: block; }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .result-item:last-child { border-bottom: none; }
        .result-item-name { font-size: 13px; }
        .result-item-price { color: var(--accent); font-size: 13px; }
        
        .result-total {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,212,170,0.3);
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        
        .result-cart-btn {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .loading { display: none; text-align: center; padding: 16px; color: var(--text-secondary); font-size: 12px; }
        .loading.show { display: block; }
        .thinking-dots { display: inline-flex; gap: 4px; margin-left: 8px; }
        .thinking-dots span { width: 6px; height: 6px; background: #00d4aa; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .thinking-text { color: #00d4aa; font-size: 12px; }
        
        .cart-badge {
            position: fixed;
            bottom: 70px;
            right: 16px;
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(192, 57, 43, 0.4);
            z-index: 99;
            cursor: pointer;
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: #000;
            font-size: 11px;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 199;
            display: none;
        }
        .cart-overlay.show { display: block; }
        
        .cart-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-dark);
            border-radius: 16px 16px 0 0;
            padding: 16px;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.3s;
            max-height: 70vh;
            overflow-y: auto;
        }
        .cart-modal.show { transform: translateY(0); }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .cart-header h3 { font-size: 16px; }
        .cart-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .cart-item-name { flex: 1; font-size: 13px; }
        
        .cart-item-stepper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .cart-total {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            font-weight: bold;
        }
        .cart-total-price { color: var(--accent); }
        
        .cart-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 30px;
            font-size: 13px;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 13px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            text-align: center;
        }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .footer { text-align: center; padding: 14px; font-size: 11px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏮 洪八公粤菜酒楼</h1>
    </div>
    
    <div class="container">
        <div class="banner">
            <div class="banner-icon">🤖</div>
            <div class="banner-text">
                <h3>AI 智能推荐</h3>
                <p>告诉小八你的需求</p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="filterDishes('all')">全部</button>
            <button class="tab" onclick="filterDishes('粤菜')">粤菜</button>
            <button class="tab" onclick="filterDishes('湘菜')">湘菜</button>
            <button class="tab" onclick="filterDishes('川菜')">川菜</button>
            <button class="tab" onclick="filterDishes('招牌')">招牌</button>
        </div>
        
        <div class="dishes-grid" id="dishesGrid"></div>
    </div>
    
    <!-- 购物车按钮 -->
    <div class="cart-badge" onclick="openCart()">
        🛒
        <div class="cart-count" id="cartCount">0</div>
    </div>
    
    <!-- 搭配推荐浮窗 -->
    <div class="pair-popup" id="pairPopup">
        <div class="pair-overlay" onclick="closePairPopup()"></div>
        <div class="pair-content">
            <div class="pair-header">
                <span class="pair-title">✨ 美味搭配推荐</span>
                <button class="pair-close" onclick="closePairPopup()">×</button>
            </div>
            <div id="pairList"></div>
            <button class="pair-done-btn" onclick="closePairPopup()">暂时不需要</button>
        </div>
    </div>
    
    <!-- 购物车弹窗 -->
    <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
    <div class="cart-modal" id="cartModal">
        <div class="cart-header">
            <h3>🛒 已点菜品</h3>
            <button class="cart-close" onclick="closeCart()">×</button>
        </div>
        <div id="cartItems"></div>
        <div class="cart-total">
            <span>合计</span>
            <span class="cart-total-price" id="cartTotal">¥0</span>
        </div>
    </div>
    
    <!-- AI推荐 -->
    <div class="chat-section" id="chatSection">
        <div class="chat-toggle" onclick="toggleChat()">
            <span class="chat-toggle-icon">🤖</span>
            <span class="chat-toggle-text">AI智能推荐</span>
        </div>
        
        <div class="chat-content">
            <div class="chat-header">
                <div class="chat-avatar">小八</div>
                <div class="chat-title">
                    <h3>AI 点菜助手</h3>
                    <p>说出你的需求</p>
                </div>
                <button class="chat-close-btn" onclick="closeChat()">✕</button>
            </div>
            
            <textarea class="chat-input" id="userNeed" placeholder="例如：4个人，预算400元"></textarea>
            
            <button class="chat-btn" id="submitBtn" onclick="submitNeed()">
                🚀 获取推荐
            </button>
            
            <div class="loading" id="loading">推荐中...</div>
            
            <div class="result-section" id="resultSection"></div>
        </div>
    </div>
    
    <div class="footer">地址：深圳南山区海大创意园东座2楼</div>
    
    <div class="toast" id="toast"></div>

                { name: '米饭', reason: '东坡肉盖饭，经典' }
            ]},
            { name: '佛跳墙', price: 298, category: '闽菜', tags: ['招牌', '滋补'], desc: '山珍海味，滋补佳品', pairs: [
                { name: '老火靓汤', reason: '双汤滋补，养生首选' },
                { name: '白切鸡', reason: '山珍配白切，顶级盛宴' }
            ]}
        ];

        let currentFilter = 'all';
        let cart = {};
        let recommendedDishes = [];
        let currentPairDish = null;

        function loadDishes() {
            const grid = document.getElementById('dishesGrid');
            grid.innerHTML = '';
            
            const filtered = currentFilter === 'all' 
                ? allDishes 
                : allDishes.filter(d => d.category === currentFilter || d.tags.includes(currentFilter));
            
            filtered.forEach(dish => {
                const qty = cart[dish.name] || 0;
                const div = document.createElement('div');
                div.className = 'dish-card';
                div.innerHTML = `
                    <div class="dish-name">${dish.name}</div>
                    <div class="dish-desc">${dish.desc}</div>
                    <div class="dish-bottom">
                        <span class="dish-price">¥${dish.price}</span>
                        ${qty > 0 ? `
                            <div class="stepper show">
                                <button class="stepper-btn" onclick="updateCart('${dish.name}', -1)">-</button>
                                <span class="stepper-num">${qty}</span>
                                <button class="stepper-btn" onclick="updateCart('${dish.name}', 1)">+</button>
                            </div>
                        ` : `
                            <button class="add-btn" onclick="addToCartAndShowPair('${dish.name}')">+</button>
                        `}
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function filterDishes(category) {
            currentFilter = category;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadDishes();
        }

        function addToCartAndShowPair(dishName) {
            updateCart(dishName, 1);
            showPairPopup(dishName);
        }

        function showPairPopup(dishName) {
            const dish = allDishes.find(d => d.name === dishName);
            if (!dish || !dish.pairs) {
                closePairPopup();
                return;
            }
            
            currentPairDish = dishName;
            const pairList = document.getElementById('pairList');
            
            let html = '';
            dish.pairs.forEach(pair => {
                const pairDish = allDishes.find(d => d.name === pair.name);
                if (pairDish) {
                    html += `
                        <div class="pair-dish">
                            <div class="pair-dish-info">
                                <div class="pair-dish-name">${pair.name}</div>
                                <div class="pair-dish-reason">${pair.reason}</div>
                            </div>
                            <div class="pair-dish-right">
                                <span class="pair-dish-price">¥${pairDish.price}</span>
                                <button class="pair-add-btn" onclick="addPairDish('${pair.name}')">+</button>
                            </div>
                        </div>
                    `;
                }
            });
            
            pairList.innerHTML = html;
            document.getElementById('pairPopup').classList.add('show');
        }

        function closePairPopup() {
            document.getElementById('pairPopup').classList.remove('show');
            currentPairDish = null;
        }

        function addPairDish(dishName) {
            updateCart(dishName, 1);
            showToast(`已加入 ${dishName}`);
            closePairPopup();
        }

        function updateCart(name, delta) {
            if (!cart[name]) cart[name] = 0;
            cart[name] += delta;
            if (cart[name] <= 0) delete cart[name];
            updateCartUI();
            loadDishes();
        }

        function updateCartUI() {
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            const el = document.getElementById('cartCount');
            el.textContent = count;
            el.style.display = count > 0 ? 'flex' : 'none';
            
            const cartItems = document.getElementById('cartItems');
            if (Object.keys(cart).length === 0) {
                cartItems.innerHTML = '<div class="cart-empty">购物车是空的</div>';
            } else {
                let html = '';
                let total = 0;
                allDishes.forEach(dish => {
                    if (cart[dish.name]) {
                        const qty = cart[dish.name];
                        const subtotal = dish.price * qty;
                        total += subtotal;
                        html += `
                            <div class="cart-item">
                                <span class="cart-item-name">${dish.name} ×${qty}</span>
                                <div class="cart-item-stepper">
                                    <button class="stepper-btn" onclick="updateCart('${dish.name}', -1)">-</button>
                                    <span>${qty}</span>
                                    <button class="stepper-btn" onclick="updateCart('${dish.name}', 1)">+</button>
                                </div>
                            </div>
                        `;
                    }
                });
                cartItems.innerHTML = html;
                document.getElementById('cartTotal').textContent = '¥' + total;
            }
        }

        function openCart() {
            document.getElementById('cartOverlay').classList.add('show');
            document.getElementById('cartModal').classList.add('show');
        }

        function closeCart() {
            document.getElementById('cartOverlay').classList.remove('show');
            document.getElementById('cartModal').classList.remove('show');
        }

        function toggleChat() {
            document.getElementById('chatSection').classList.add('expanded');
        }

        function closeChat() {
            document.getElementById('chatSection').classList.remove('expanded');
        }

        async function submitNeed() {
            const input = document.getElementById('userNeed');
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            
            if (!input.value.trim()) {
                showToast('请说出您的需求~');
                return;
            }
            
            btn.disabled = true;
            resultSection.classList.remove('show');
            
            // 思考动效
            const thinkingTexts = ['正在分析口味', '查询库存中', '搭配菜单', '生成推荐'];
            let thinkIndex = 0;
            
            loading.innerHTML = `<span class="thinking-text">${thinkingTexts[0]}</span><div class="thinking-dots"><span></span><span></span><span></span></div>`;
            loading.classList.add('show');
            
            // 轮换显示思考文字
            const thinkInterval = setInterval(() => {
                thinkIndex = (thinkIndex + 1) % thinkingTexts.length;
                loading.innerHTML = `<span class="thinking-text">${thinkingTexts[thinkIndex]}</span><div class="thinking-dots"><span></span><span></span><span></span></div>`;
            }, 600);
            
            try {
                await fetch('https://open.feishu.cn/open-apis/bot/v2/hook/e5155d24-dbc1-4644-94ac-53fa1d593f46', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msg_type: 'text', content: { text: `【点菜需求】${input.value}` } })
                });
                
                await new Promise(r => setTimeout(r, 2500));
                
                clearInterval(thinkInterval);
                
                recommendedDishes = generateRecommendation(input.value);
                
                let total = 0;
                let html = `<p style="margin-bottom:10px;font-size:13px;">📝 ${input.value}</p>`;
                html += `<p style="color:#00d4aa;margin-bottom:10px;font-size:12px;">💡 为您推荐：</p>`;
                
                recommendedDishes.forEach(d => {
                    total += d.price;
                    html += `
                        <div class="result-item">
                            <span class="result-item-name">${d.name}</span>
                            <span class="result-item-price">¥${d.price}</span>
                        </div>
                    `;
                });
                
                html += `
                    <div class="result-total">
                        <span>预估总价</span>
                        <span>¥${total}</span>
                    </div>
                    <button class="result-cart-btn" onclick="addRecommendedToCart()">🛒 加入购物车</button>
                `;
                
                resultSection.innerHTML = html;
                resultSection.classList.add('show');
                
            } catch (error) {
                clearInterval(thinkInterval);
                showToast('提交失败');
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        }

        function generateRecommendation(need) {
            const lower = need.toLowerCase();
            let count = 4;
            let budget = 400;
            
            if (lower.includes('2')) count = 2;
            else if (lower.includes('3')) count = 3;
            else if (lower.includes('5')) count = 5;
            else if (lower.includes('6')) count = 6;
            else if (lower.includes('8')) count = 8;
            
            if (lower.includes('300')) budget = 300;
            else if (lower.includes('500')) budget = 500;
            else if (lower.includes('600')) budget = 600;
            else if (lower.includes('800')) budget = 800;
            else if (lower.includes('1000')) budget = 1000;
            
            const maxBudget = budget + 50;
            const selected = [];
            let total = 0;
            
            const signature = allDishes.filter(d => d.tags.includes('招牌'));
            for (const dish of signature) {
                if (selected.length >= count) break;
                if (total + dish.price <= maxBudget) {
                    selected.push(dish);
                    total += dish.price;
                }
            }
            
            for (const dish of allDishes) {
                if (selected.length >= count) break;
                if (!selected.find(d => d.name === dish.name) && total + dish.price <= maxBudget) {
                    selected.push(dish);
                    total += dish.price;
                }
            }
            
            return selected;
        }

        function addRecommendedToCart() {
            recommendedDishes.forEach(d => {
                if (!cart[d.name]) cart[d.name] = 0;
                cart[d.name] += 1;
            });
            updateCartUI();
            openCart();
            showToast('已加入购物车');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        loadDishes();
        updateCartUI();
    </script>
</body>
</html>
